name: Deploy to App Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: rag-master
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:741448945431:service/rag-master/d8fd8b57f0ef41eda8deaf856697bb65

concurrency:
  group: deploy-apprunner
  cancel-in-progress: false   # cola — no cancela, espera su turno

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 --provenance=false \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Wait for App Runner to be ready
        run: |
          echo "Checking App Runner service state..."
          for i in $(seq 1 40); do
            STATUS=$(aws apprunner describe-service \
              --service-arn $APP_RUNNER_SERVICE_ARN \
              --query 'Service.Status' --output text)
            echo "  State: $STATUS"
            if [ "$STATUS" = "RUNNING" ] || [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "Ready to deploy (state: $STATUS)"
              break
            fi
            echo "  Service busy, waiting 15s..."
            sleep 15
          done

      - name: Deploy to App Runner
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          # El hash bcrypt contiene '$2b$12$…'. Si se inyecta con ${{ secrets }}
          # inline en el string double-quoted de abajo, bash expande $2b/$12 y lo
          # corrompe. Pasándolo por env y referenciándolo como "$ADMIN_PASSWORD_HASH"
          # bash lo expande UNA vez y no re-escanea el resultado → llega intacto.
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
        run: |
          aws apprunner update-service \
            --service-arn $APP_RUNNER_SERVICE_ARN \
            --source-configuration "{
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"arn:aws:iam::741448945431:role/AppRunnerECRAccessRole\"
              },
              \"AutoDeploymentsEnabled\": false,
              \"ImageRepository\": {
                \"ImageIdentifier\": \"$IMAGE_URI\",
                \"ImageConfiguration\": {
                  \"Port\": \"3000\",
                  \"StartCommand\": \"sh scripts/start.sh\",
                  \"RuntimeEnvironmentVariables\": {
                    \"DATABASE_URL\": \"${{ secrets.DATABASE_URL }}\",
                    \"ADMIN_ACCESS_TOKEN\": \"${{ secrets.ADMIN_ACCESS_TOKEN }}\",
                    \"AUTH_SECRET\": \"${{ secrets.AUTH_SECRET }}\",
                    \"ADMIN_EMAIL\": \"${{ secrets.ADMIN_EMAIL }}\",
                    \"ADMIN_PASSWORD_HASH\": \"$ADMIN_PASSWORD_HASH\",
                    \"OPENAI_API_KEY\": \"${{ secrets.OPENAI_API_KEY }}\",
                    \"OPENAI_IMAGE_MODEL\": \"gpt-image-2\",
                    \"SERPER_API_KEY\": \"${{ secrets.SERPER_API_KEY }}\",
                    \"S3_BUCKET_NAME\": \"${{ secrets.S3_BUCKET_NAME }}\",
                    \"AWS_REGION\": \"${{ env.AWS_REGION }}\",
                    \"AWS_ACCESS_KEY_ID\": \"${{ secrets.APP_AWS_ACCESS_KEY_ID }}\",
                    \"AWS_SECRET_ACCESS_KEY\": \"${{ secrets.APP_AWS_SECRET_ACCESS_KEY }}\",
                    \"BEDROCK_CLAUDE_MODEL_ID\": \"us.anthropic.claude-opus-4-7\",
                    \"BEDROCK_EMBEDDING_MODEL_ID\": \"us.cohere.embed-v4:0\",
                    \"BEDROCK_EXPANSION_MODEL_ID\": \"us.anthropic.claude-haiku-4-5-20251001-v1:0\",
                    \"BEDROCK_VALIDATOR_MODEL_ID\": \"us.anthropic.claude-haiku-4-5-20251001-v1:0\",
                    \"BEDROCK_RERANK_MODEL_ID\": \"cohere.rerank-v3-5:0\",
                    \"BEDROCK_SEMAPHORE_LIMIT\": \"3\",
                    \"PGVECTOR_EF_SEARCH\": \"200\",
                    \"ENABLE_CITATION_VALIDATION\": \"false\",
                    \"NODE_ENV\": \"production\",
                    \"HOSTNAME\": \"0.0.0.0\",
                    \"PORT\": \"3000\"
                  }
                },
                \"ImageRepositoryType\": \"ECR\"
              }
            }"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for App Runner deployment..."
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn $APP_RUNNER_SERVICE_ARN \
              --query 'Service.Status' --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Deployment successful — App Runner RUNNING"
              break
            elif [ "$STATUS" = "UPDATE_FAILED" ] || [ "$STATUS" = "CREATE_FAILED" ]; then
              echo "Deployment failed!"
              exit 1
            fi
            sleep 15
          done
          if [ "$STATUS" != "RUNNING" ]; then
            echo "Timeout waiting for deployment"
            exit 1
          fi

      - name: Setup Node for smoke test
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Smoke test — real /api/chat request
        env:
          ADMIN_ACCESS_TOKEN: ${{ secrets.ADMIN_ACCESS_TOKEN }}
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn $APP_RUNNER_SERVICE_ARN \
            --query 'Service.ServiceUrl' --output text)
          echo "Target: https://$SERVICE_URL"

          # Cold start: App Runner puede tardar ~30s en aceptar el primer request.
          # Hacemos hasta 6 intentos de health check antes del smoke real.
          for i in $(seq 1 6); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://$SERVICE_URL/" || echo "000")
            echo "  warm-up $i: HTTP $CODE"
            if [ "$CODE" = "200" ] || [ "$CODE" = "307" ] || [ "$CODE" = "308" ]; then
              break
            fi
            sleep 10
          done

          npx --yes tsx scripts/smoke-test.mts --target="https://$SERVICE_URL" --timeout=120
