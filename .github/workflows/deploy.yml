name: Deploy to App Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: rag-master
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:741448945431:service/rag-master/d8fd8b57f0ef41eda8deaf856697bb65

concurrency:
  group: deploy-apprunner
  cancel-in-progress: false   # cola — no cancela, espera su turno

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Migraciones: se intentan desde CI (rápido si la DB es accesible).
      # Si la DB no es accesible desde GitHub Actions (VPC/whitelist),
      # el paso falla silenciosamente y la migración corre en el startup del contenedor
      # vía scripts/apply-migrations.js (antes de node server.js en el Dockerfile CMD).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations (best-effort from CI)
        continue-on-error: true
        run: npx prisma db execute --file ./prisma/migrations/20260331000001_add_conversation_status/migration.sql --schema ./prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 --provenance=false \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Wait for App Runner to be ready
        run: |
          echo "Checking App Runner service state..."
          for i in $(seq 1 40); do
            STATUS=$(aws apprunner describe-service \
              --service-arn $APP_RUNNER_SERVICE_ARN \
              --query 'Service.Status' --output text)
            echo "  State: $STATUS"
            if [ "$STATUS" = "RUNNING" ] || [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "Ready to deploy (state: $STATUS)"
              break
            fi
            echo "  Service busy, waiting 15s..."
            sleep 15
          done

      - name: Deploy to App Runner
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          aws apprunner update-service \
            --service-arn $APP_RUNNER_SERVICE_ARN \
            --source-configuration "{
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"arn:aws:iam::741448945431:role/AppRunnerECRAccessRole\"
              },
              \"AutoDeploymentsEnabled\": false,
              \"ImageRepository\": {
                \"ImageIdentifier\": \"$IMAGE_URI\",
                \"ImageConfiguration\": {
                  \"Port\": \"3000\",
                  \"StartCommand\": \"node server.js\",
                  \"RuntimeEnvironmentVariables\": {
                    \"DATABASE_URL\": \"${{ secrets.DATABASE_URL }}\",
                    \"S3_BUCKET_NAME\": \"${{ secrets.S3_BUCKET_NAME }}\",
                    \"AWS_REGION\": \"${{ env.AWS_REGION }}\",
                    \"AWS_ACCESS_KEY_ID\": \"${{ secrets.APP_AWS_ACCESS_KEY_ID }}\",
                    \"AWS_SECRET_ACCESS_KEY\": \"${{ secrets.APP_AWS_SECRET_ACCESS_KEY }}\",
                    \"BEDROCK_CLAUDE_MODEL_ID\": \"${{ secrets.BEDROCK_CLAUDE_MODEL_ID }}\",
                    \"BEDROCK_EMBEDDING_MODEL_ID\": \"${{ secrets.BEDROCK_EMBEDDING_MODEL_ID }}\",
                    \"NODE_ENV\": \"production\",
                    \"HOSTNAME\": \"0.0.0.0\",
                    \"PORT\": \"3000\"
                  }
                },
                \"ImageRepositoryType\": \"ECR\"
              }
            }"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for App Runner deployment..."
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn $APP_RUNNER_SERVICE_ARN \
              --query 'Service.Status' --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "✅ Deployment successful!"
              exit 0
            elif [ "$STATUS" = "UPDATE_FAILED" ] || [ "$STATUS" = "CREATE_FAILED" ]; then
              echo "❌ Deployment failed!"
              exit 1
            fi
            sleep 15
          done
          echo "⏰ Timeout waiting for deployment"
          exit 1
